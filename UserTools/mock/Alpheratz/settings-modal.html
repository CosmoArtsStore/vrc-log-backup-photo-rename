<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alpheratz Mock - Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="overlay">
    <div class="dialog small">
      <section class="dialog-side">
        <div class="section-head">
          <h3>設定</h3>
          <div class="menu-button" style="width:32px;height:32px;">×</div>
        </div>

        <div class="field-block">
          <label class="field-label">VRChat写真フォルダ</label>
          <div style="display:flex; gap:8px;">
            <input class="field" value="C:\Users\User\Pictures\VRChat" readonly>
            <button class="primary-button" style="width:100px;">変更</button>
          </div>
        </div>

        <div class="field-block">
          <label class="field-label">ログイン時に起動</label>
          <div style="display:flex; align-items:center; justify-content:space-between; gap:16px;">
            <p style="margin:0; font-size:13px; color:#6b7280;">Windows ログイン時に Alpheratz を自動で起動します。</p>
            <button class="primary-button">無効にする</button>
          </div>
        </div>
      </section>
    </div>
  </div>
  <div class="caption-note">対応実装: `SettingsModal.tsx`。写真フォルダ変更と自動起動切替。</div>
</body>
</html>
