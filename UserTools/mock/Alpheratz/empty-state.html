<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alpheratz Mock - Empty State</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="mock-page">
    <div class="mock-shell">
      <header class="mock-header">
        <div class="menu-button">≡</div>
        <div class="brand">
          <div class="brand-mark"></div>
          <h1 class="brand-text">Alpheratz</h1>
        </div>
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input value="ワールド名で検索..." aria-label="ワールド検索">
        </div>
      </header>

      <div class="empty-shell">
        <div>
          <div style="font-size:48px; opacity:0.45;">⌕</div>
          <h2 class="empty-title">検索結果が見つかりません</h2>
          <p class="empty-sub">検索条件を変えてみてください。</p>
        </div>
      </div>
    </div>
    <div class="caption-note">対応実装: `EmptyState.tsx`。絞り込み中なら検索結果なし、通常時は写真が見つからない状態を表示。</div>
    <div class="mock-links">
      <a href="main-dashboard.html">一覧画面へ</a>
      <a href="settings-modal.html">設定モーダルへ</a>
    </div>
  </div>
</body>
</html>
