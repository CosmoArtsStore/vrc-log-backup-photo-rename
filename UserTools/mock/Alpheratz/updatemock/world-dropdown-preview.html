<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alpheratz – World Dropdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: #e8eaf4;
      font-family: 'DM Sans', 'Hiragino Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #1a1d2e;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 24px;
      gap: 32px;
      flex-wrap: wrap;
    }

    :root {
      --accent:        #4f52e8;
      --accent-dim:    rgba(79,82,232,0.09);
      --accent-border: rgba(79,82,232,0.22);
      --surface:       #ffffff;
      --surface-2:     #f7f8fc;
      --border:        #e2e5f0;
      --border-2:      #d1d5e8;
      --text:          #1a1d2e;
      --text-dim:      #6b7280;
      --text-faint:    #9ca3af;
      --t: 0.14s cubic-bezier(0.4,0,0.2,1);
    }

    .preview-label {
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
      margin-top: 10px;
    }

    /* ════════════════════════════
       共通ドロップダウンシェル
    ════════════════════════════ */
    .dd-wrap { position: relative; width: 228px; }

    /* トリガーボタン */
    .dd-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
      cursor: pointer;
      transition: border-color var(--t), box-shadow var(--t), background var(--t);
      text-align: left;
      font-family: 'DM Sans', sans-serif;
    }
    .dd-trigger:hover { border-color: var(--border-2); background: var(--surface); }
    .dd-trigger.open  { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); background: var(--surface); border-radius: 10px 10px 0 0; border-bottom-color: transparent; }
    .dd-trigger.active { border-color: var(--accent-border); background: var(--accent-dim); }
    .dd-trigger.active.open { border-color: var(--accent); }

    .dd-icon {
      width: 24px; height: 24px;
      border-radius: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: grid; place-items: center;
      font-size: 12px; flex-shrink: 0;
      transition: background var(--t);
    }
    .dd-trigger.active .dd-icon { background: rgba(79,82,232,0.14); border-color: var(--accent-border); }

    .dd-label-wrap { flex: 1; min-width: 0; }
    .dd-sublabel {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-faint); margin-bottom: 1px;
    }
    .dd-trigger.active .dd-sublabel { color: var(--accent); opacity: 0.7; }
    .dd-value {
      font-size: 13px; font-weight: 600;
      color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dd-trigger.active .dd-value { color: var(--accent); }

    .dd-arrow {
      font-size: 10px; color: var(--text-faint); flex-shrink: 0;
      transition: transform var(--t);
    }
    .dd-trigger.open .dd-arrow { transform: rotate(180deg); }

    /* ドロップダウンパネル */
    .dd-panel {
      position: absolute;
      top: calc(100% - 1px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-top: none;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 8px 24px rgba(26,29,46,0.12);
      z-index: 100;
      overflow: hidden;
      animation: dd-in 0.14s ease;
    }
    @keyframes dd-in {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 検索ボックス */
    .dd-search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .dd-search-icon { font-size: 14px; color: var(--text-faint); flex-shrink: 0; }
    .dd-search {
      flex: 1; border: none; outline: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: var(--text);
    }
    .dd-search::placeholder { color: var(--text-faint); }

    /* リスト */
    .dd-list {
      max-height: 220px;
      overflow-y: auto;
      padding: 4px;
    }
    .dd-list::-webkit-scrollbar { width: 4px; }
    .dd-list::-webkit-scrollbar-track { background: transparent; }
    .dd-list::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 999px; }

    .dd-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background var(--t);
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }
    .dd-item:hover { background: var(--surface-2); }
    .dd-item.selected { background: var(--accent-dim); color: var(--accent); font-weight: 700; }
    .dd-item.unknown  { color: var(--text-faint); font-style: italic; }

    .dd-item-dot {
      width: 7px; height: 7px;
      border-radius: 999px;
      background: var(--border-2);
      flex-shrink: 0;
    }
    .dd-item.selected .dd-item-dot { background: var(--accent); }

    .dd-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .dd-item-count {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text-faint);
      flex-shrink: 0;
    }
    .dd-item.selected .dd-item-count { color: var(--accent); opacity: 0.65; }

    .dd-item-check {
      font-size: 12px;
      color: var(--accent);
      flex-shrink: 0;
      opacity: 0;
    }
    .dd-item.selected .dd-item-check { opacity: 1; }

    /* セパレーター */
    .dd-sep {
      height: 1px;
      background: var(--border);
      margin: 4px;
    }

    /* グループラベル */
    .dd-group-label {
      padding: 6px 10px 3px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    /* フッター */
    .dd-footer {
      padding: 6px 12px 8px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-faint);
      text-align: center;
    }
    .dd-footer strong { color: var(--accent); }
  </style>
</head>
<body>

  <!-- ① 未選択（閉じた状態） -->
  <div>
    <div class="dd-wrap">
      <button class="dd-trigger">
        <span class="dd-icon">🌐</span>
        <div class="dd-label-wrap">
          <div class="dd-sublabel">ワールド</div>
          <div class="dd-value">すべてのワールド</div>
        </div>
        <span class="dd-arrow">▼</span>
      </button>
    </div>
    <div class="preview-label">① 未選択（閉じた状態）</div>
  </div>

  <!-- ② 開いた状態・検索中 -->
  <div>
    <div class="dd-wrap">
      <button class="dd-trigger open active">
        <span class="dd-icon">🌐</span>
        <div class="dd-label-wrap">
          <div class="dd-sublabel">ワールド</div>
          <div class="dd-value">The Black Cat</div>
        </div>
        <span class="dd-arrow">▼</span>
      </button>
      <div class="dd-panel">
        <div class="dd-search-wrap">
          <span class="dd-search-icon">⌕</span>
          <input class="dd-search" placeholder="ワールド名で絞り込む..." value="">
        </div>
        <div class="dd-list">
          <!-- すべて -->
          <div class="dd-item">
            <span class="dd-item-dot"></span>
            <span class="dd-item-name">すべてのワールド</span>
            <span class="dd-item-count">275枚</span>
            <span class="dd-item-check">✓</span>
          </div>
          <div class="dd-sep"></div>
          <!-- 通常ワールド -->
          <div class="dd-group-label">訪問済みワールド</div>
          <div class="dd-item selected">
            <span class="dd-item-dot"></span>
            <span class="dd-item-name">The Black Cat</span>
            <span class="dd-item-count">48枚</span>
            <span class="dd-item-check">✓</span>
          </div>
          <div class="dd-item">
            <span class="dd-item-dot"></span>
            <span class="dd-item-name">Midnight Rooftop</span>
            <span class="dd-item-count">95枚</span>
            <span class="dd-item-check">✓</span>
          </div>
          <div class="dd-item">
            <span class="dd-item-dot"></span>
            <span class="dd-item-name">Blue Memory</span>
            <span class="dd-item-count">32枚</span>
            <span class="dd-item-check">✓</span>
          </div>
          <div class="dd-item">
            <span class="dd-item-dot"></span>
            <span class="dd-item-name">Neon Sanctuary</span>
            <span class="dd-item-count">21枚</span>
            <span class="dd-item-check">✓</span>
          </div>
          <div class="dd-item">
            <span class="dd-item-dot"></span>
            <span class="dd-item-name">Cozy Forest House</span>
            <span class="dd-item-count">17枚</span>
            <span class="dd-item-check">✓</span>
          </div>
          <div class="dd-sep"></div>
          <!-- 不明 -->
          <div class="dd-group-label">その他</div>
          <div class="dd-item unknown">
            <span class="dd-item-dot"></span>
            <span class="dd-item-name">ワールド不明</span>
            <span class="dd-item-count">62枚</span>
            <span class="dd-item-check">✓</span>
          </div>
        </div>
        <div class="dd-footer"><strong>6</strong> ワールド</div>
      </div>
    </div>
    <div class="preview-label">② 開いた状態（1件選択中）</div>
  </div>

  <!-- ③ 検索でフィルター中 -->
  <div>
    <div class="dd-wrap">
      <button class="dd-trigger open">
        <span class="dd-icon">🌐</span>
        <div class="dd-label-wrap">
          <div class="dd-sublabel">ワールド</div>
          <div class="dd-value">すべてのワールド</div>
        </div>
        <span class="dd-arrow">▼</span>
      </button>
      <div class="dd-panel">
        <div class="dd-search-wrap">
          <span class="dd-search-icon">⌕</span>
          <input class="dd-search" placeholder="ワールド名で絞り込む..." value="black">
        </div>
        <div class="dd-list">
          <div class="dd-group-label">「black」の検索結果</div>
          <div class="dd-item">
            <span class="dd-item-dot"></span>
            <span class="dd-item-name">The <strong style="color:var(--accent);">Black</strong> Cat</span>
            <span class="dd-item-count">48枚</span>
            <span class="dd-item-check">✓</span>
          </div>
        </div>
        <div class="dd-footer"><strong>1</strong> 件一致</div>
      </div>
    </div>
    <div class="preview-label">③ キーワード検索中（"black"）</div>
  </div>

</body>
</html>
