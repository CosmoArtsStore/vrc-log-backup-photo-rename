<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alpheratz Mock Index</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="mock-page">
    <div class="mock-shell" style="min-height:auto; padding:32px;">
      <h1 class="brand-text" style="margin:0 0 16px; -webkit-text-fill-color:unset; color:#4f46e5;">Alpheratz Mock Index</h1>
      <p style="margin:0 0 20px; color:#6b7280;">現状 UI の主要画面を、実装の構造と情報密度に近い形で再現したモック一覧です。</p>
      <div class="action-row" style="flex-wrap:wrap;">
        <a class="action-card" href="main-dashboard.html" style="text-decoration:none; color:inherit; min-width:260px;">
          <div class="action-icon">▦</div>
          <div><h3 class="action-title">Dashboard</h3><p class="action-sub">一覧 / 検索 / 月移動 / アクションカード</p></div>
        </a>
        <a class="action-card" href="scan-overlay.html" style="text-decoration:none; color:inherit; min-width:260px;">
          <div class="action-icon">◌</div>
          <div><h3 class="action-title">Scan Overlay</h3><p class="action-sub">スキャン / 補足情報更新の進捗表示</p></div>
        </a>
        <a class="action-card" href="photo-modal.html" style="text-decoration:none; color:inherit; min-width:260px;">
          <div class="action-icon">◫</div>
          <div><h3 class="action-title">Photo Modal</h3><p class="action-sub">写真詳細 / タグ / メモ / 類似写真</p></div>
        </a>
      </div>
      <div class="action-row" style="flex-wrap:wrap; margin-top:12px;">
        <a class="action-card" href="settings-modal.html" style="text-decoration:none; color:inherit; min-width:260px;">
          <div class="action-icon">⚙</div>
          <div><h3 class="action-title">Settings</h3><p class="action-sub">写真フォルダ / 自動起動設定</p></div>
        </a>
        <a class="action-card" href="startup-choice.html" style="text-decoration:none; color:inherit; min-width:260px;">
          <div class="action-icon">⇥</div>
          <div><h3 class="action-title">Startup Choice</h3><p class="action-sub">初回の自動起動選択</p></div>
        </a>
        <a class="action-card" href="empty-state.html" style="text-decoration:none; color:inherit; min-width:260px;">
          <div class="action-icon">∅</div>
          <div><h3 class="action-title">Empty State</h3><p class="action-sub">写真なし / 検索結果なし</p></div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
